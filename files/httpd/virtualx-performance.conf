# HTTP/2 global aktivieren
<IfModule http2_module>
    Protocols h2 http/1.1
    H2Direct on
</IfModule>

KeepAlive On
KeepAliveTimeout 2
MaxKeepAliveRequests 200

<IfModule mpm_event_module>
    StartServers 2
    ServerLimit 14
    ThreadsPerChild 25
    MaxRequestWorkers 350
    MinSpareThreads 25
    MaxSpareThreads 75
    MaxConnectionsPerChild 10000
</IfModule>

# Brotli Komprimierung (bevorzugt für moderne Browser)
<IfModule mod_brotli.c>
    AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml
</IfModule>

# Gzip als Fallback für ältere Clients
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml
</IfModule>

# Security Headers – gelten global für alle VHosts
Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
