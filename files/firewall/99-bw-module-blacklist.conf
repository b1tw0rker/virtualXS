# Kernel Module Blacklist for Web/DNS Server
# Modules that are not needed on a dedicated web or DNS server
# Applied via /etc/modprobe.d/
# (C) BitWorker

############
# added by AI
############

# Printing / Parallel Port
install lp /bin/true
install ppdev /bin/true
install parport /bin/true
install parport_pc /bin/true

# Exotic Filesystems (not needed on a server)
install cramfs /bin/true
install freevxfs /bin/true
install jffs2 /bin/true
install hfs /bin/true
install hfsplus /bin/true
# Note: squashfs may be needed by DNF - keep commented unless sure
#install squashfs /bin/true
install udf /bin/true

# Unused Network Protocols
install dccp /bin/true
install sctp /bin/true
install rds /bin/true
install tipc /bin/true

# USB Storage (no external storage on a server)
install usb-storage /bin/true

# Bluetooth
install bluetooth /bin/true
install btusb /bin/true

# FireWire
install firewire-core /bin/true

# Floppy
install floppy /bin/true
