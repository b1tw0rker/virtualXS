

### by BitWorker
###
###
chroot_local_user=YES
hide_file={*.virtualx,.bash_logout,.bash_profile,.bashrc,WEBSTATS}
force_dot_files=YES

# SSL
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1_1=YES
ssl_tlsv1_2=YES
ssl_tlsv1=NO
ssl_sslv2=NO
ssl_sslv3=NO
require_ssl_reuse=YES
ssl_ciphers=HIGH
#rsa_cert_file=/etc/letsencrypt/live/srv.bit-worker.com/fullchain.pem
#rsa_private_key_file=/etc/letsencrypt/live/srv.bit-worker.com/privkey.pem

xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES

# to get through an restricted iptables firewall
pasv_enable=YES
pasv_min_port=10000
pasv_max_port=11000

