; Default Securty Setting by BitWorker

session.cookie_httponly = true
session.cookie_samesite = Strict
session.cookie_secure = true

expose_php = Off

; Verhindert Anzeige von Fehlermeldungen im Browser (kein Info-Leak)
display_errors = Off
display_startup_errors = Off

; Fehler werden ins Log geschrieben statt angezeigt
log_errors = On

; Verhindert das Einbinden externer URLs via include/require (Remote File Inclusion)
allow_url_include = Off

; Verhindert das Öffnen externer URLs via fopen/file_get_contents
allow_url_fopen = Off

; Session-ID darf nicht per URL übertragen werden (Session Hijacking)
session.use_only_cookies = 1

; Verhindert Session Fixation - der Server vergibt immer eine neue Session-ID
session.use_strict_mode = 1

; Regeneriert die Session-ID beim Login (verhindert Session Fixation)
session.use_trans_sid = 0

; Deaktiviert kritische PHP-Funktionen bei erhaltener WordPress-Kompatibilitaet
; shell_exec wird von virtualx gebraucht um user anzulegen
disable_functions = exec,passthru,system,proc_open,popen,proc_close,proc_terminate,proc_get_status,proc_nice,parse_ini_file,show_source,highlight_file,phpinfo,putenv,posix_kill,posix_setpgid,posix_setsid,posix_setuid,posix_setgid,posix_seteuid,posix_setegid,pcntl_exec,pcntl_fork

; Verhindert Path-Traversal-RCE bei PHP-FPM (z.B. /img.jpg/shell.php wird sonst als PHP ausgeführt)
cgi.fix_pathinfo = 0

; Verhindert dynamisches Nachladen von PHP-Extensions zur Laufzeit
enable_dl = Off

; Verhindert Info-Leak des PHP-Skriptpfads in E-Mail-Headern (X-PHP-Originating-Script)
mail.add_x_header = Off