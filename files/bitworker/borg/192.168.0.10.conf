# Borg backup configuration for source host 192.168.0.10.

JOB_NAME="192.168.0.10"
SOURCE_SSH="root@192.168.0.10"
SOURCE_HOST="192.168.0.10"

# Host/IP that the source server uses to reach this backup server.
BACKUP_HOST="192.168.0.11"
REPOSITORY_SSH_USER="root"
REPOSITORY_PATH="/srv/borg/192.168.0.10.borg"

PATHS_FILE="/etc/bitworker/borg/192.168.0.10.paths"
PATTERNS_FILE="/etc/bitworker/borg/192.168.0.10.patterns"
LOG_DIR="/var/log/borg"

BORG_PASSPHRASE=""
BORG_COMPRESSION="zstd,6"

KEEP_DAILY="7"
KEEP_WEEKLY="4"
KEEP_MONTHLY="6"

REMOTE_BORG="borg"
SSH_KEY="/root/.ssh/id_ed25519"
SSH_CONNECT_TIMEOUT="10"

# Keep backups on one filesystem per source path. This avoids accidentally
# following mounted filesystems below /home, /var, etc.
ONE_FILE_SYSTEM="true"
